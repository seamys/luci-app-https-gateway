name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build source package
        run: |
          PKG_NAME="luci-app-https-gateway"
          VERSION="${{ steps.version.outputs.version }}"
          ARCHIVE="${PKG_NAME}_${VERSION}.tar.gz"

          mkdir -p "dist/${PKG_NAME}"
          cp -r src Makefile "dist/${PKG_NAME}/"
          tar -czf "dist/${ARCHIVE}" -C dist "${PKG_NAME}"
          echo "archive=dist/${ARCHIVE}" >> "$GITHUB_ENV"
          echo "archive_name=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ env.archive }}
