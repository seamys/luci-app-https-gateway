name: deploy

# Build luci-app-https-gateway (x86_64) with the OpenWrt 25.12.4 SDK and
# deploy it to the LAN OpenWrt gateway (192.168.0.1) over SSH.
#
# Version is derived from git: PKG_VERSION = latest v* tag, PKG_RELEASE =
# commits since that tag + 1, so every main push produces an upgradeable
# package (1.0.0-r1, 1.0.0-r2, ...) without touching the Makefile.
on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  SDK_URL: "https://downloads.openwrt.org/releases/25.12.4/targets/x86/64/openwrt-sdk-25.12.4-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
  SDK_DIR: "openwrt-sdk-25.12.4-x86-64_gcc-14.3.0_musl.Linux-x86_64"
  PKG_NAME: "luci-app-https-gateway"
  GATEWAY: "root@192.168.0.1"

jobs:
  build-deploy:
    runs-on: mumu-ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: pkg
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses-dev libssl-dev python3 python3-setuptools \
            rsync unzip zlib1g-dev file wget zstd ca-certificates curl openssh-client

      - name: Derive package version from git
        working-directory: pkg
        run: |
          git config --global --add safe.directory "$PWD"
          DESCRIBE=$(git describe --tags --match 'v*' --long)   # e.g. v1.0.0-3-g5e1094e
          VERSION=${DESCRIBE#v}; VERSION=${VERSION%%-*}
          COMMITS=$(echo "$DESCRIBE" | awk -F- '{print $(NF-1)}')
          RELEASE=$((COMMITS + 1))
          sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=${VERSION}/; s/^PKG_RELEASE:=.*/PKG_RELEASE:=${RELEASE}/" Makefile
          grep -E '^PKG_(VERSION|RELEASE)' Makefile

      - name: Download & extract OpenWrt SDK
        run: |
          wget -q -O sdk.tar.zst "$SDK_URL"
          tar --use-compress-program=unzstd -xf sdk.tar.zst
          test -d "$SDK_DIR"

      - name: Prepare package & feeds
        working-directory: ${{ env.SDK_DIR }}
        run: |
          mkdir -p "package/${PKG_NAME}"
          cp -r "${GITHUB_WORKSPACE}/pkg/src" "${GITHUB_WORKSPACE}/pkg/Makefile" "package/${PKG_NAME}/"
          ./scripts/feeds update -a
          ./scripts/feeds install luci-base rpcd-mod-luci nginx-ssl acme-acmesh \
            acme-acmesh-dnsapi curl ca-bundle ca-certificates

      - name: Compile
        working-directory: ${{ env.SDK_DIR }}
        run: |
          make defconfig
          make "package/${PKG_NAME}/compile" V=s -j$(nproc) 2>&1 | tail -n 40 || \
          make "package/${PKG_NAME}/compile" V=s -j1

      - name: Collect apk
        id: collect
        working-directory: ${{ env.SDK_DIR }}
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/dist"
          find bin -type f -name "${PKG_NAME}*.apk" -exec cp -v {} "${GITHUB_WORKSPACE}/dist/" \;
          ls -la "${GITHUB_WORKSPACE}/dist/"
          test -n "$(ls -A "${GITHUB_WORKSPACE}/dist/")"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-x86_64
          path: dist/*.apk

      - name: Deploy to OpenWrt gateway
        env:
          SSH_KEY: ${{ secrets.OPENWRT_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          SSH_OPTS="-i $HOME/.ssh/deploy_key -o StrictHostKeyChecking=accept-new"
          APK=$(ls dist/*.apk | head -1)
          NAME=$(basename "$APK")
          echo "deploying $NAME"
          scp -O $SSH_OPTS "$APK" "${GATEWAY}:/tmp/${NAME}"
          ssh $SSH_OPTS "$GATEWAY" "apk add --allow-untrusted /tmp/${NAME} && rm /tmp/${NAME} && https-gateway status"
